<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>鼓譜編輯器</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Noto+Sans+TC:wght@400;500;700&display=swap');

:root {
  --bg: #fafaf8;
  --surface: #ffffff;
  --border: #e0e0d8;
  --border2: #c8c8c0;
  --text: #1a1a18;
  --text2: #666660;
  --muted: #aaaaA0;
  --accent: #1a1a18;
  --accent-light: #f0f0e8;
  --line: #333330;
  --hit-x: #1a1a18;
  --hit-o: #1a1a18;
  --playing-col: rgba(26,26,24,0.07);
  --toolbar: #f5f5f0;
  --active-tool: #1a1a18;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans TC', sans-serif;
  height: 100%;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  font-size: 14px;
}

/* ── TOP BAR ── */
.topbar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.logo {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700;
  font-size: 0.85rem;
  letter-spacing: 0.08em;
  color: var(--text);
}

.title-input {
  background: transparent;
  border: none;
  border-bottom: 1px solid transparent;
  color: var(--text);
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 0.85rem;
  padding: 2px 4px;
  width: 180px;
  transition: border-color 0.15s;
}
.title-input:focus { outline: none; border-bottom-color: var(--border2); }

.topbar-right {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-left: auto;
}

.btn {
  padding: 4px 12px;
  border-radius: 3px;
  border: 1px solid var(--border2);
  background: var(--surface);
  color: var(--text);
  font-size: 0.76rem;
  cursor: pointer;
  font-family: 'Noto Sans TC', sans-serif;
  transition: all 0.1s;
  white-space: nowrap;
}
.btn:hover { background: var(--accent-light); }
.btn.dark { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn.dark:hover { background: #333; }
.vsep { width: 1px; height: 16px; background: var(--border); }

/* ── TOOLBAR ── */
.toolbar {
  display: flex;
  align-items: center;
  gap: 0;
  padding: 0 16px;
  background: var(--toolbar);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  flex-wrap: wrap;
}

.toolbar-group {
  display: flex;
  align-items: center;
  gap: 2px;
  padding: 4px 8px 4px 0;
  border-right: 1px solid var(--border);
  margin-right: 8px;
  flex-wrap: wrap;
  max-width: 320px;
}
.toolbar-group:last-child { border-right: none; margin-right: 0; }

.toolbar-label {
  font-size: 0.65rem;
  color: var(--muted);
  margin-right: 6px;
  font-family: 'JetBrains Mono', monospace;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.tool-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 30px;
  height: 28px;
  border-radius: 3px;
  border: 1px solid transparent;
  background: transparent;
  cursor: pointer;
  font-size: 0.78rem;
  color: var(--text2);
  transition: all 0.1s;
  margin-right: 2px;
  font-family: 'Noto Sans TC', sans-serif;
  user-select: none;
  position: relative;
}
.tool-btn:hover { background: var(--accent-light); color: var(--text); }
.tool-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.tool-btn.erase-btn { border-color: #c84040; color: #c84040; }
.tool-btn.erase-btn:hover { background: #c84040; color: #fff; border-color: #c84040; }
.tool-btn.erase-btn.active { background: #c84040; color: #fff; border-color: #c84040; }
.tool-btn.undo-btn { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; width: auto; padding: 0 8px; }
.tool-btn.undo-btn:disabled { opacity: 0.25; cursor: not-allowed; }
.tool-btn[title]:hover::after {
  content: attr(title);
  position: absolute;
  top: 32px;
  left: 50%;
  transform: translateX(-50%);
  background: #333;
  color: #fff;
  padding: 3px 7px;
  border-radius: 3px;
  font-size: 0.68rem;
  white-space: nowrap;
  z-index: 100;
  pointer-events: none;
}

.bpm-row {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 0.72rem;
  color: var(--text2);
}
.bpm-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.95rem;
  font-weight: 700;
  color: var(--text);
  min-width: 32px;
  text-align: right;
}
input[type=range] { width: 80px; accent-color: var(--text); cursor: pointer; }

.sig-select {
  background: transparent;
  border: 1px solid var(--border2);
  color: var(--text);
  padding: 2px 6px;
  border-radius: 3px;
  font-size: 0.76rem;
  font-family: 'JetBrains Mono', monospace;
  cursor: pointer;
}

.play-btn {
  padding: 4px 14px;
  border-radius: 3px;
  border: 1px solid var(--accent);
  background: var(--accent);
  color: #fff;
  font-size: 0.76rem;
  cursor: pointer;
  font-family: 'Noto Sans TC', sans-serif;
  transition: all 0.1s;
}
.play-btn:hover { background: #333; border-color: #333; }

/* ── SECTION TABS ── */


/* ── SCORE AREA ── */
.score-area {
  flex: 1;
  overflow: auto;
  padding: 20px 24px;
  background: var(--bg);
}

/* ── STAFF ── */
.staff-container {
  max-width: 900px;
  margin: 0 auto;
}

.staff-row {
  display: flex;
  align-items: flex-start;
  margin-bottom: 32px;
}

/* Instrument labels */
.inst-labels {
  display: flex;
  flex-direction: column;
  width: 36px;
  flex-shrink: 0;
  padding-top: 2px;
}
.inst-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.6rem;
  color: var(--text2);
  text-align: right;
  padding-right: 6px;
  cursor: pointer;
  user-select: none;
  transition: color 0.1s;
  line-height: 1;
}
.inst-label:hover { color: var(--text); }
.inst-label.muted { color: var(--muted); text-decoration: line-through; }

/* Staff SVG wrapper */
.staff-svg-wrap {
  flex: 1;
  overflow-x: auto;
}

svg.staff {
  display: block;
  cursor: crosshair;
}

/* ── MEASURE CONTROLS ── */
.measure-controls {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 12px;
}
.measure-info {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  color: var(--muted);
}

/* ── STATUS ── */
.statusbar {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 4px 16px;
  background: var(--toolbar);
  border-top: 1px solid var(--border);
  font-size: 0.68rem;
  color: var(--muted);
  font-family: 'JetBrains Mono', monospace;
  flex-shrink: 0;
}
.playing-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--muted); display: inline-block; margin-right: 4px;
}
.playing-dot.on { background: #1a8a3a; animation: blink 0.7s infinite; }
@keyframes blink { 0%,100%{opacity:1}50%{opacity:0.2} }

/* ── MODAL ── */
.modal-bg {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.3); z-index: 500;
  align-items: center; justify-content: center;
}
.modal-bg.open { display: flex; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 6px;
  padding: 20px;
  width: 360px; max-width: 92vw;
  box-shadow: 0 8px 32px rgba(0,0,0,0.12);
}
.modal h3 { font-size: 0.9rem; margin-bottom: 14px; }
.modal label { display: block; font-size: 0.74rem; color: var(--text2); margin-bottom: 3px; }
.modal input[type=text] {
  width: 100%;
  border: 1px solid var(--border2);
  padding: 6px 9px;
  border-radius: 3px;
  font-size: 0.8rem;
  font-family: 'Noto Sans TC', sans-serif;
  margin-bottom: 10px;
  background: var(--bg);
}
.modal input[type=text]:focus { outline: none; border-color: var(--text); }
.modal-actions { display: flex; gap: 6px; justify-content: flex-end; margin-top: 12px; }

/* TOAST */
#toast {
  position: fixed; bottom: 18px; right: 18px;
  background: var(--text); color: #fff;
  padding: 7px 14px; border-radius: 4px;
  font-size: 0.76rem; opacity: 0;
  transition: opacity 0.2s; z-index: 999; pointer-events: none;
}
#toast.show { opacity: 1; }

@media print {
  .topbar, .toolbar, .section-tabs, .statusbar, .modal-bg, .measure-controls { display: none !important; }
  body { background: #fff; overflow: visible; height: auto; }
  .score-area { overflow: visible; padding: 8px; }
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <a href="index.html" class="btn" style="padding:4px 10px;font-size:0.8rem;" title="返回鼓譜庫">← 返回</a>
  <div class="vsep"></div>
  <div class="logo">DRUM</div>
  <div class="vsep"></div>
  <input class="title-input" id="songTitle" type="text" value="無標題鼓譜" placeholder="曲目名稱">
  <div class="topbar-right">
    <span id="saveStatus" style="font-size:0.68rem;color:#aaa;font-family:'JetBrains Mono',monospace;"></span>
    <button class="btn" onclick="manageTags()" title="管理標籤">🏷 標籤</button>
    <button class="btn" onclick="saveToDrive()" id="saveBtn">☁ 儲存</button>
    <a href="guide.html" target="_blank" class="btn" style="background:transparent;color:#666;border-color:#c8c8c0;font-size:0.78rem;" title="使用教學">？</a>
    <button class="btn dark" onclick="window.print()">列印</button>
  </div>
</div>

<!-- TOOLBAR -->
<div class="toolbar">
  <!-- Note value -->
  <div class="toolbar-group">
    <span class="toolbar-label">時值</span>
    <div class="tool-btn" id="dur-1"   title="全音符 (4拍)"          onclick="setDur('1',this)">𝅝</div>
    <div class="tool-btn" id="dur-1d"  title="附點二分 (3拍)"        onclick="setDur('2d',this)">𝅗.</div>
    <div class="tool-btn" id="dur-2"   title="二分音符 (2拍)"        onclick="setDur('2',this)">𝅗</div>
    <div class="tool-btn active" id="dur-4"   title="四分音符 (1拍)" onclick="setDur('4',this)">♩</div>
    <div class="tool-btn" id="dur-4d"  title="附點四分 (1.5拍)"      onclick="setDur('4d',this)">♩.</div>
    <div class="tool-btn" id="dur-8"   title="八分音符 (0.5拍)"      onclick="setDur('8',this)">♪</div>
    <div class="tool-btn" id="dur-8d"  title="附點八分 (0.75拍)"     onclick="setDur('8d',this)">♪.</div>
    <div class="tool-btn" id="dur-8t"  title="八分三連音 (1拍3個)"   onclick="setDur('8t',this)">³♪</div>
    <div class="tool-btn" id="dur-16"  title="十六分音符 (0.25拍)"   onclick="setDur('16',this)">𝅘𝅥𝅯</div>
    <div class="tool-btn" id="dur-16d" title="附點十六分"            onclick="setDur('16d',this)">𝅘𝅥𝅯.</div>
    <div class="tool-btn" id="dur-16t" title="十六分三連音/六連音"   onclick="setDur('16t',this)">⁶𝅘𝅥𝅯</div>
  </div>
  <!-- Symbol type -->
  <div class="toolbar-group">
    <span class="toolbar-label">符號</span>
    <div class="tool-btn active" id="sym-x"    title="叉號 x（鈸/HH）"     onclick="setSym('x',this)">✕</div>
    <div class="tool-btn" id="sym-o"    title="空心 o（鼓擊）"              onclick="setSym('o',this)">○</div>
    <div class="tool-btn" id="sym-X"    title="重音叉 X（Accent鈸）"        onclick="setSym('X',this)">✕̈</div>
    <div class="tool-btn" id="sym-O"    title="重音鼓 O（Accent鼓）"        onclick="setSym('O',this)">●</div>
    <div class="tool-btn" id="sym-cs"   title="邊擊 Cross Stick ⊕"         onclick="setSym('cs',this)">⊕</div>
    <div class="tool-btn" id="sym-rs"   title="鈸邊擊 Rimshot"              onclick="setSym('rs',this)">⊗</div>
    <div class="tool-btn" id="sym-xo"   title="開鈸 Open HH"               onclick="setSym('xo',this)">✕°</div>
    <div class="tool-btn" id="sym-xc"   title="閉鈸 Closed HH"             onclick="setSym('xc',this)">✕+</div>
    <div class="tool-btn" id="sym-g"    title="鬼音 Ghost Note"             onclick="setSym('g',this)">()</div>
    <div class="tool-btn" id="sym-f"    title="Flam（雙重奏）"              onclick="setSym('f',this)">𝆐</div>
    <div class="tool-btn" id="sym-drag" title="Drag（拖音）"                onclick="setSym('drag',this)">//</div>
    <div class="tool-btn" id="sym-r"    title="輪鼓 Roll"                   onclick="setSym('r',this)">≋</div>
    <div class="tool-btn" id="sym-rest" title="休止符"                      onclick="setSym('rest',this)">𝄽</div>
  </div>
  <!-- Erase + Undo -->
  <div class="toolbar-group">
    <div class="tool-btn erase-btn" id="sym-erase" title="橡皮擦 (E) — 再按一次取消" onclick="toggleErase()">橡皮擦</div>
    <div class="tool-btn undo-btn" title="Undo (⌘Z)" onclick="doUndo()">↩</div>
    <div class="tool-btn undo-btn" title="Redo (⌘⇧Z)" onclick="doRedo()">↪</div>
  </div>
  <!-- Measure -->
  <div class="toolbar-group">
    <span class="toolbar-label">小節</span>
    <div class="tool-btn" title="新增小節" onclick="addMeasure()">＋</div>
    <div class="tool-btn" title="刪除最後小節" onclick="removeMeasure()">－</div>
  </div>
  <!-- Per-measure sig override -->
  <div class="toolbar-group">
    <span class="toolbar-label">單節拍號</span>
    <span style="font-size:0.72rem;color:#888;">第</span>
    <input type="number" id="measSigIdx" min="1" value="1"
      style="width:38px;font-size:0.76rem;padding:2px 4px;border:1px solid #c8c8c0;border-radius:3px;text-align:center;"
      onkeydown="if(event.key==='Enter')applyMeasureSigInput()">
    <span style="font-size:0.72rem;color:#888;">節改</span>
    <input type="text" id="measSigVal" placeholder="如 3/4" value=""
      style="width:48px;font-size:0.76rem;padding:2px 4px;border:1px solid #c8c8c0;border-radius:3px;text-align:center;"
      onkeydown="if(event.key==='Enter')applyMeasureSigInput()">
    <button class="btn" style="padding:2px 8px;font-size:0.72rem;" onclick="applyMeasureSigInput()">套用</button>
  </div>
  <!-- BPM -->
  <div class="toolbar-group">
    <span class="toolbar-label">BPM</span>
    <input type="range" id="bpmSlider" min="40" max="240" value="120" oninput="updateBpm(this.value)">
    <span class="bpm-num" id="bpmNum">120</span>
  </div>
  <!-- Global time sig -->
  <div class="toolbar-group">
    <span class="toolbar-label">拍號</span>
    <select class="sig-select" id="sigSelect">
      <option>4/4</option><option>2/4</option><option>3/4</option>
      <option>6/8</option><option>7/8</option><option>7/4</option>
      <option>5/4</option><option>5/8</option><option>9/8</option>
      <option>12/8</option><option>3/8</option><option>5/16</option>
      <option value="custom">自訂…</option>
    </select>
    <input type="text" id="sigCustom" placeholder="如 11/8"
      style="display:none;width:54px;font-size:0.76rem;padding:3px 5px;border:1px solid #c8c8c0;border-radius:3px;font-family:'Noto Sans TC',sans-serif;"
      onkeydown="if(event.key==='Enter')confirmGlobalSig()">
    <button class="btn" style="padding:3px 8px;font-size:0.72rem;" onclick="confirmGlobalSig()">確定</button>
  </div>
  <!-- Playback -->
  <div class="toolbar-group">
    <button class="play-btn" id="playBtn" onclick="togglePlay()">▶ 播放</button>
    <div class="tool-btn" title="停止" onclick="stopPlay()" style="margin-left:4px">■</div>
    <div class="tool-btn" id="loopBtn" title="循環播放" onclick="toggleLoop()" style="margin-left:2px">🔁</div>
  </div>
</div>

<!-- SCORE AREA -->
<div class="score-area" id="scoreArea">
  <div class="staff-container" id="staffContainer">
    <div class="measure-controls">
      <span class="measure-info" id="measureInfo">0 小節</span>
    </div>
    <div id="staffWrap"></div>
  </div>
</div>

<!-- STATUS BAR -->
<div class="statusbar">
  <span><span class="playing-dot" id="playDot"></span><span id="statusTxt">就緒</span></span>
  <span id="posInfo">Bar 1 · Beat 1</span>
  <span id="totalBars">共 0 小節</span>
  <span>橡皮擦: E｜Undo: ⌘Z｜Redo: ⌘⇧Z</span>
</div>

<!-- TAG MANAGEMENT MODAL -->
<div class="modal-bg" id="tagModal">
  <div class="modal">
    <h3>🏷 這張譜的標籤</h3>
    <div id="tagChipsWrap" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;min-height:32px;"></div>
    <label style="font-size:0.74rem;color:#888;">新增標籤（輸入後按 Enter）</label>
    <input type="text" id="tagInput" placeholder="輸入標籤名稱…" style="margin-top:4px;"
      onkeydown="if(event.key==='Enter'){addTag();event.preventDefault()}">
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('tagModal')">關閉</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════
// CONFIG
// ═══════════════════════════════════

// Instruments in order top→bottom on staff
const INSTRUMENTS = [
  { abbr:'CR',  name:'Crash',       sym:'x', lineIdx:0 },
  { abbr:'RC',  name:'Ride',        sym:'x', lineIdx:1 },
  { abbr:'HH',  name:'Hi-Hat',      sym:'x', lineIdx:2 },
  { abbr:'S',   name:'Snare',       sym:'o', lineIdx:3 },
  { abbr:'T1',  name:'Hi Tom',      sym:'o', lineIdx:4 },
  { abbr:'T2',  name:'Mid Tom',     sym:'o', lineIdx:5 },
  { abbr:'FT',  name:'Floor Tom',   sym:'o', lineIdx:6 },
  { abbr:'HF',  name:'HH Foot',     sym:'x', lineIdx:7 },
  { abbr:'B',   name:'Bass',        sym:'o', lineIdx:8 },
];
const N_INST = INSTRUMENTS.length;

// SVG layout constants
const CELL_W = 28;       // width per 16th note cell
const ROW_H  = 14;       // height per instrument row
const STAFF_PAD_TOP = 18;
const STAFF_PAD_BOT = 8;
const LABEL_W = 40;
const STAFF_H = N_INST * ROW_H + STAFF_PAD_TOP + STAFF_PAD_BOT;

// 5 staff lines mapped to specific rows
const STAFF_LINES = [2, 3, 4, 5, 6]; // lineIdx values that get a real line

// ═══════════════════════════════════
// STATE
// ═══════════════════════════════════
let measures = [];      // [ [N_INST][cells] ]  — flat, no sections
let lyrics = [];        // string[] one per measure
let currentDur = '4';   // durCode: '1','2','4','8','16','4d','8d','8t','16d','16t','2d'
let currentSym = 'x';
let bpm = 120;
let timeSig = '4/4';
let loopEnabled = true;
let isPlaying = false;
let playStep = 0;
let playTimer = null;
let timerInterval = null;
let elapsedMs = 0;
let startMs = 0;
let audioCtx = null;
let mutedInst = new Set();

// ── UNDO / REDO ──
const MAX_HISTORY = 60;
let undoStack = [];
let redoStack = [];

// ── Duration code helpers ──
// durCode: '1','2','4','8','16' straight
//          '4d','8d','8d','16d' dotted (1.5x)
//          '8t' triplet (3/beat), '16t' sextuplet (6/beat)

// Returns subdivisions per beat for a given durCode
// We always use 12 as LCM for triplet grid, 16 for binary, 48 for combined
// To keep it simple: binary grid = 16 cells/beat, triplet grid = 12 cells/beat
function gridTypeForDur(dur) {
  if (dur === '8t' || dur === '16t') return 'triplet';
  return 'binary';
}

// Cells per beat in the grid
function cellsPerBeatForGrid(gridType) {
  return gridType === 'triplet' ? 12 : 16;
}

// Duration in "sixteenth-note units" (regardless of grid)
// Whole=16, Half=8, Quarter=4, 8th=2, 16th=1 (relative to 4/4 denom=4)
function durInSixteenths(dur, sig) {
  const denom = parseInt(((sig||timeSig||'4/4').split('/')[1])) || 4;
  // one beat = (4/denom) sixteenth notes
  const beatIn16 = 4 / denom;
  const map = {
    '1':  16 / denom * 4,   // whole note = 4 beats
    '2':  8  / denom * 4,
    '2d': 12 / denom * 4,   // dotted half = 3 beats
    '4':  beatIn16,          // quarter = 1 beat
    '4d': beatIn16 * 1.5,
    '8':  beatIn16 * 0.5,
    '8d': beatIn16 * 0.75,
    '8t': beatIn16 / 3,     // triplet 8th = 1/3 beat
    '16': beatIn16 * 0.25,
    '16d':beatIn16 * 0.375,
    '16t':beatIn16 / 6,
  };
  return map[dur] != null ? map[dur] : beatIn16;
}

// How many GRID CELLS does a note of `noteDur` occupy,
// given the measure's grid unit is `gridDur`?
function cellSpanForDur(noteDur, sig, gridDur) {
  gridDur = gridDur || currentDur;
  const noteVal = durInSixteenths(noteDur, sig);
  const gridVal = durInSixteenths(gridDur, sig);
  return Math.max(1, Math.round(noteVal / gridVal));
}

// Finest duration among all notes in a measure (auto grid)
const DUR_ORDER = ['16t','16d','16','8t','8d','8','4d','4','2d','2','1'];
function autoGridDur(meas) {
  let finest = '4'; // default quarter grid
  const rows = meas.rows || meas;
  rows.forEach(row => row.forEach(cell => {
    if (!cell || cell.sym === 'rest') return;
    const d = String(cell.dur || '4');
    const di = DUR_ORDER.indexOf(d);
    const fi = DUR_ORDER.indexOf(finest);
    if (di !== -1 && (fi === -1 || di < fi)) finest = d;
  }));
  return finest;
}

// Total cells in a measure
function cellsForMeasure(sig, dur) {
  sig = sig || timeSig;
  dur = dur || currentDur;
  const [n, d] = (sig || '4/4').split('/').map(Number);
  const beats = isNaN(n) ? 4 : n;
  const grid = gridTypeForDur(dur);
  const cpb = cellsPerBeatForGrid(grid);
  return beats * cpb;
}

function cellsPerMeasure() { return cellsForMeasure(timeSig, currentDur); }

// INIT
// ═══════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  if (DRIVE_ID && DRIVE_TOKEN) {
    loadFromDrive();
  } else {
    const s = localStorage.getItem('drumtab_v4');
    if (s) { try { applyData(JSON.parse(s)); } catch(e){ initDefault(); } }
    else initDefault();
    renderAll();
  }
});

function makeMeasure(durUnit, sig) {
  // New empty measures default to quarter grid; auto-expands when notes are added
  durUnit = '4';
  sig = sig || timeSig;
  const cpm = cellsForMeasure(sig, durUnit);
  const rows = [];
  for (let i = 0; i < N_INST; i++) rows.push(new Array(cpm).fill(null));
  return { rows, durUnit, sig };
}

function initDefault() {
  measures = [];
  lyrics = [];
  for (let m = 0; m < 8; m++) {
    measures.push(makeMeasure());
    lyrics.push('');
  }
}

function applyData(d) {
  if (d.title) document.getElementById('songTitle').value = d.title;
  // Support both new flat format and old sections format
  if (d.measures) {
    measures = d.measures.map(m => {
      if (Array.isArray(m)) return { rows: m, durUnit: '4', sig: d.timeSig || '4/4' };
      if (m.rows) return { ...m, durUnit: String(m.durUnit || '4') };
      return { rows: m, durUnit: '4', sig: d.timeSig || '4/4' };
    });
    lyrics = d.lyrics || new Array(measures.length).fill('');
  } else if (d.sections && d.sections.length > 0) {
    measures = [];
    lyrics = [];
    d.sections.forEach(sec => {
      sec.measures.forEach((m, i) => {
        const rows = Array.isArray(m) ? m : (m.rows || m);
        measures.push({ rows, durUnit: '4', sig: d.timeSig || '4/4' });
        lyrics.push(sec.lyrics ? (sec.lyrics[i] || '') : '');
      });
    });
  }
  if (d.bpm) { bpm = d.bpm; document.getElementById('bpmSlider').value = bpm; document.getElementById('bpmNum').textContent = bpm; }
  if (d.timeSig) { timeSig = d.timeSig; document.getElementById('sigSelect').value = timeSig; }
}

// STAFF RENDERING (SVG)
// ═══════════════════════════════════
const SVG_NS = 'http://www.w3.org/2000/svg';

function renderStaff() {
  const wrap = document.getElementById('staffWrap');
  wrap.innerHTML = '';

  const BARS_PER_ROW = 4;
  const cpm = cellsPerMeasure();

  // Group measures into rows of BARS_PER_ROW
  for (let rowStart = 0; rowStart < measures.length; rowStart += BARS_PER_ROW) {
    const rowMeasures = measures.slice(rowStart, rowStart + BARS_PER_ROW);
    const totalCells = rowMeasures.reduce((a, m) => a + (m.rows || m)[0].length, 0);
    const svgW = LABEL_W + totalCells * CELL_W + 20;

    const div = document.createElement('div');
    div.style.cssText = 'display:flex;flex-direction:column;margin-bottom:24px;';
    const staffRow = document.createElement('div');
    staffRow.style.cssText = 'display:flex;align-items:flex-start;';

    // Instrument labels
    const labelDiv = document.createElement('div');
    labelDiv.style.cssText = `width:${LABEL_W}px;flex-shrink:0;padding-top:${STAFF_PAD_TOP + 2}px;`;
    INSTRUMENTS.forEach((inst, i) => {
      const lbl = document.createElement('div');
      lbl.className = 'inst-label' + (mutedInst.has(i) ? ' muted' : '');
      lbl.textContent = inst.abbr;
      lbl.style.height = ROW_H + 'px';
      lbl.style.lineHeight = ROW_H + 'px';
      lbl.title = inst.name + '（點擊靜音）';
      lbl.onclick = () => { mutedInst.has(i) ? mutedInst.delete(i) : mutedInst.add(i); renderStaff(); };
      labelDiv.appendChild(lbl);
    });
    staffRow.appendChild(labelDiv);

    // SVG staff
    const svg = document.createElementNS(SVG_NS, 'svg');
    svg.setAttribute('class', 'staff');
    svg.setAttribute('width', svgW);
    svg.setAttribute('height', STAFF_H);
    svg.style.userSelect = 'none';

    // Background
    rect(svg, 0, 0, svgW, STAFF_H, '#fff', 'none');

    // Staff lines (for 5 standard lines)
    const staffLineIdxs = [2,3,4,5,6]; // which instrument rows get a staff line
    staffLineIdxs.forEach(li => {
      const y = STAFF_PAD_TOP + li * ROW_H + ROW_H / 2;
      line(svg, 0, y, svgW - 4, y, '#ccc', 1);
    });

    // Ledger-like thin lines for all rows
    INSTRUMENTS.forEach((inst, i) => {
      if (!staffLineIdxs.includes(i)) {
        const y = STAFF_PAD_TOP + i * ROW_H + ROW_H / 2;
        line(svg, 0, y, svgW - 4, y, '#e8e8e0', 0.5);
      }
    });

    // Percussion clef (simplified bracket)
    const clefX = 2;
    line(svg, clefX + 3, STAFF_PAD_TOP + staffLineIdxs[0] * ROW_H + ROW_H/2,
             clefX + 3, STAFF_PAD_TOP + staffLineIdxs[4] * ROW_H + ROW_H/2, '#555', 2.5);
    line(svg, clefX + 6, STAFF_PAD_TOP + staffLineIdxs[0] * ROW_H + ROW_H/2,
             clefX + 6, STAFF_PAD_TOP + staffLineIdxs[4] * ROW_H + ROW_H/2, '#555', 2.5);

    // Time signature display
    const [sigN, sigD] = timeSig.split('/');
    text(svg, 14, STAFF_PAD_TOP + 2 * ROW_H, sigN, '#333', '10px', 'bold');
    text(svg, 14, STAFF_PAD_TOP + 4 * ROW_H, sigD || '?', '#333', '10px', 'bold');

    // Draw measures
    let xOffset = 22;
    rowMeasures.forEach((meas, mIdx) => {
      const globalMeasIdx = rowStart + mIdx;
      const rows = meas.rows || meas;  // support both formats
      // Auto grid: finest note in this measure determines grid density
      const measDurUnit = autoGridDur(meas);
      const measSig = meas.sig || timeSig;
      const nCells = rows[0].length;
      const measW = nCells * CELL_W;

      // Beat grid background colours
      const [sigN, sigDd] = (measSig || '4/4').split('/').map(Number);
      const beats = sigN || 4;
      const cellsPerBeat = nCells / beats;
      for (let b = 0; b < beats; b++) {
        const bx = xOffset + b * cellsPerBeat * CELL_W;
        const beatFill = b === 0 ? 'rgba(0,0,0,0.03)' : (b % 2 === 0 ? 'rgba(0,0,0,0.015)' : 'transparent');
        if (beatFill !== 'transparent') {
          rect(svg, bx, STAFF_PAD_TOP, cellsPerBeat * CELL_W, STAFF_H - STAFF_PAD_TOP - STAFF_PAD_BOT, beatFill, 'none');
        }
        // Beat line
        line(svg, bx, STAFF_PAD_TOP, bx, STAFF_H - STAFF_PAD_BOT, '#ddd', 0.5);
        // Sub-beat lines (between 8th notes if 16th grid)
        if (cellsPerBeat >= 4) {
          for (let sub = 1; sub < cellsPerBeat; sub++) {
            if (sub % 2 !== 0) {
              const sx = bx + sub * CELL_W;
              line(svg, sx, STAFF_PAD_TOP + 2, sx, STAFF_H - STAFF_PAD_BOT - 2, '#ebebeb', 0.4);
            }
          }
        }
      }

      // Measure number label
      const mnBg = document.createElementNS(SVG_NS, 'rect');
      mnBg.setAttribute('x', xOffset + 1); mnBg.setAttribute('y', 1);
      mnBg.setAttribute('width', 26); mnBg.setAttribute('height', 13);
      mnBg.setAttribute('rx', 2); mnBg.setAttribute('fill', '#f0f0e8');
      svg.appendChild(mnBg);
      const mnTxt = document.createElementNS(SVG_NS, 'text');
      mnTxt.setAttribute('x', xOffset + 4); mnTxt.setAttribute('y', 11);
      mnTxt.setAttribute('fill', '#888'); mnTxt.setAttribute('font-size', '8px');
      mnTxt.setAttribute('font-family', 'JetBrains Mono, monospace');
      mnTxt.textContent = `小節 ${globalMeasIdx + 1}`;
      svg.appendChild(mnTxt);

      // DurUnit + sig badges (clickable)
      const durSyms = {'1':'𝅝','2':'𝅗','4':'♩','8':'♪','16':'𝅘𝅥𝅯',
        '2d':'𝅗.','4d':'♩.','8d':'♪.','16d':'𝅘𝅥𝅯.','8t':'³♪','16t':'⁶𝅘𝅥𝅯'};
      // Sig badge (left of dur badge)
      const sigBadge = document.createElementNS(SVG_NS, 'text');
      sigBadge.setAttribute('x', xOffset + measW - 32);
      sigBadge.setAttribute('y', 11);
      sigBadge.setAttribute('fill', measSig !== timeSig ? '#c84040' : '#bbb');
      sigBadge.setAttribute('font-size', '7px');
      sigBadge.setAttribute('font-family', 'JetBrains Mono, monospace');
      sigBadge.setAttribute('cursor', 'pointer');
      sigBadge.setAttribute('title', '點擊修改此小節拍號');
      sigBadge.textContent = measSig;
      sigBadge.addEventListener('click', (e) => { e.stopPropagation(); promptMeasureSig(globalMeasIdx); });
      sigBadge.addEventListener('mouseenter', function(){ this.setAttribute('fill','#333'); });
      sigBadge.addEventListener('mouseleave', function(){ this.setAttribute('fill', measSig !== timeSig ? '#c84040' : '#bbb'); });
      svg.appendChild(sigBadge);
      // Dur badge
      const durBadge = document.createElementNS(SVG_NS, 'text');
      durBadge.setAttribute('x', xOffset + measW - 14);
      durBadge.setAttribute('y', 11);
      durBadge.setAttribute('fill', '#aaa');
      durBadge.setAttribute('font-size', '9px');
      durBadge.setAttribute('cursor', 'pointer');
      durBadge.setAttribute('title', '點擊切換此小節格子細度');
      durBadge.textContent = durSyms[measDurUnit] || '♩';
      // dur badge is display-only (auto grid, no manual click)
      durBadge.style.cursor = 'default';
      svg.appendChild(durBadge);

      // Delete button
      if (measures.length > 1) {
        const delBtn = document.createElementNS(SVG_NS, 'text');
        delBtn.setAttribute('x', xOffset + measW - 7);
        delBtn.setAttribute('y', STAFF_PAD_TOP - 2);
        delBtn.setAttribute('font-size', '7px');
        delBtn.setAttribute('fill', '#ccc');
        delBtn.setAttribute('cursor', 'pointer');
        delBtn.textContent = '✕';
        delBtn.addEventListener('mouseenter', function(){ this.setAttribute('fill','#c84040'); });
        delBtn.addEventListener('mouseleave', function(){ this.setAttribute('fill','#ccc'); });
        delBtn.addEventListener('click', (e) => { e.stopPropagation(); deleteMeasureAt(globalMeasIdx); });
        svg.appendChild(delBtn);
      }

      // Cells & notes
      // Each cell = one grid unit (measDurUnit).
      // A note occupies cellSpanForDur(cell.dur) cells visually.
      // We draw one clickable rect per grid cell, but draw the note symbol
      // centred over its occupied span (only on the first cell of a span).
      INSTRUMENTS.forEach((inst, iIdx) => {
        const cy = STAFF_PAD_TOP + iIdx * ROW_H + ROW_H / 2;
        const measSig2 = meas.sig || timeSig;

        rows[iIdx].forEach((cell, cIdx) => {
          // Click target: always one grid cell wide
          const rx = xOffset + cIdx * CELL_W;
          const r = document.createElementNS(SVG_NS, 'rect');
          r.setAttribute('x', rx);
          r.setAttribute('y', STAFF_PAD_TOP + iIdx * ROW_H);
          r.setAttribute('width', CELL_W);
          r.setAttribute('height', ROW_H);
          r.setAttribute('fill', 'transparent');
          r.style.cursor = 'pointer';
          r.addEventListener('click', () => handleCellClick(globalMeasIdx, iIdx, cIdx));
          r.addEventListener('mouseenter', function() {
            if (currentSym !== 'erase') this.setAttribute('fill', 'rgba(0,0,0,0.05)');
            else this.setAttribute('fill', 'rgba(200,0,0,0.06)');
          });
          r.addEventListener('mouseleave', function() { this.setAttribute('fill', 'transparent'); });
          svg.appendChild(r);

          if (cell) {
            // How many grid cells does this note occupy?
            const span = Math.max(1, cellSpanForDur(cell.dur || measDurUnit, measSig2, measDurUnit));
            // Centre the symbol over its span
            const cx = xOffset + cIdx * CELL_W + (span * CELL_W) / 2;
            if (cell.sym === 'rest') {
              drawRestSymbol(svg, cx, cy, cell.dur || measDurUnit);
            } else {
              drawNoteSymbol(svg, cx, cy, cell);
            }
          }
        });
      });

      // Bar line
      const barX = xOffset + measW;
      line(svg, barX, STAFF_PAD_TOP, barX, STAFF_H - STAFF_PAD_BOT, '#888', 1.5);

      xOffset += measW;
    });

    // Final double bar line
    line(svg, xOffset, STAFF_PAD_TOP, xOffset, STAFF_H - STAFF_PAD_BOT, '#444', 2.5);
    line(svg, xOffset + 3, STAFF_PAD_TOP, xOffset + 3, STAFF_H - STAFF_PAD_BOT, '#444', 5);

    staffRow.appendChild(svg);
    div.appendChild(staffRow);

    // Lyrics row (below the staff)
    const lyricsRow = document.createElement('div');
    lyricsRow.style.cssText = `display:flex;margin-left:${LABEL_W}px;margin-top:0;margin-bottom:0;`;
    rowMeasures.forEach((meas, mIdx) => {
      const globalMeasIdx = rowStart + mIdx;
      const rows = meas.rows || meas;
      const nCells = rows[0].length;
      const measW = nCells * CELL_W;
      while (lyrics.length < measures.length) lyrics.push('');
      const val = lyrics[globalMeasIdx] || '';
      const inp = document.createElement('input');
      inp.type = 'text';
      inp.value = val;
      inp.placeholder = '歌詞…';
      inp.dataset.measIdx = globalMeasIdx;
      inp.style.cssText = `width:${measW}px;border:none;border-bottom:1px solid #e0e0d8;background:transparent;font-size:0.72rem;font-family:'Noto Sans TC',sans-serif;color:#444;padding:3px 4px;outline:none;box-sizing:border-box;`;
      inp.addEventListener('input', function() {
        while (lyrics.length < measures.length) lyrics.push('');
        lyrics[parseInt(this.dataset.measIdx)] = this.value;
      });
      inp.addEventListener('blur', autoSave);
      lyricsRow.appendChild(inp);
    });
    div.appendChild(lyricsRow);

    wrap.appendChild(div);
  }
}

function drawNoteSymbol(svg, cx, cy, cell) {
  const { sym } = cell;
  const dur      = String(cell.dur || '4');
  const baseDur  = dur.replace('d','').replace('t','');
  const isDotted  = dur.includes('d');
  const isTriplet = dur.includes('t');
  const isWhole   = baseDur === '1';
  const isHalf    = baseDur === '2';
  const isOpenHead = isWhole || isHalf;   // open (hollow) note head

  // Stem direction: top half of staff → up, bottom half → down
  const stemUp  = cy < (STAFF_PAD_TOP + 4 * ROW_H + ROW_H / 2);
  const stemLen = ROW_H * 2.8;
  const stemX   = cx + (stemUp ? 4 : -4);
  const stemY   = stemUp ? cy - stemLen : cy + stemLen;

  const isX    = sym === 'x' || sym === 'X';
  const isXO   = sym === 'xo';
  const isXC   = sym === 'xc';
  const isCS   = sym === 'cs';
  const isRS   = sym === 'rs';
  const isGhost = sym === 'g';
  const isFlam  = sym === 'f';
  const isDrag  = sym === 'drag';
  const isRoll  = sym === 'r';
  const isO    = sym === 'o' || sym === 'O';
  const accent  = sym === 'X' || sym === 'O';

  // ── Draw note head ──────────────────────────────────────
  if (isX || isXO || isXC) {
    // X head — same shape for all durations (standard drum notation)
    const s = isWhole ? 4.5 : 3.5;
    const w = accent ? 2.2 : (isWhole ? 1.8 : 1.5);
    line(svg, cx-s, cy-s, cx+s, cy+s, '#1a1a18', w);
    line(svg, cx+s, cy-s, cx-s, cy+s, '#1a1a18', w);
    // open/closed marker to the right
    if (isXO) text(svg, cx + s + 3, cy + 3, 'o', '#1a1a18', '7px');
    if (isXC) text(svg, cx + s + 3, cy + 3, '+', '#1a1a18', '7px', 'bold');

  } else if (isCS) {
    // Cross stick: square head
    const sq = document.createElementNS(SVG_NS, 'rect');
    sq.setAttribute('x', cx - 4); sq.setAttribute('y', cy - 3.5);
    sq.setAttribute('width', '8'); sq.setAttribute('height', '7');
    sq.setAttribute('fill', 'none');
    sq.setAttribute('stroke', '#1a1a18');
    sq.setAttribute('stroke-width', '1.5');
    svg.appendChild(sq);

  } else if (isRS) {
    // Rimshot: filled oval with white X
    ellipse(svg, cx, cy, 4.5, 3.5, '#1a1a18', '#1a1a18', 1);
    const s = 2.2;
    line(svg, cx-s, cy-s, cx+s, cy+s, '#fff', 1.3);
    line(svg, cx+s, cy-s, cx-s, cy+s, '#fff', 1.3);

  } else if (isGhost) {
    // Ghost: thin hollow oval with parens
    ellipse(svg, cx, cy, 3.5, 2.5, 'none', '#777', 0.9);
    text(svg, cx - 9, cy + 3.5, '(', '#777', '9px');
    text(svg, cx + 5, cy + 3.5, ')', '#777', '9px');

  } else if (isFlam) {
    // Flam: small grace note head + stem, then main note
    const graceX = cx - 7;
    const graceY = stemUp ? cy - 2 : cy + 2;
    ellipse(svg, graceX, graceY, 1.8, 1.4, '#777', '#777', 0);
    line(svg, graceX + (stemUp?1.5:-1.5), graceY, graceX + (stemUp?1.5:-1.5), graceY + (stemUp?-ROW_H*1.6:ROW_H*1.6), '#777', 0.9);
    // main head: open if whole/half, filled otherwise
    if (isOpenHead) ellipse(svg, cx, cy, 4.5, 3, 'none', '#1a1a18', 1.5);
    else            ellipse(svg, cx, cy, 4, 3, '#1a1a18', '#1a1a18', 1);

  } else if (isDrag) {
    // Drag: two grace notes then main note
    const g1x = cx - 10, g2x = cx - 5;
    const gy  = stemUp ? cy - 2 : cy + 2;
    ellipse(svg, g1x, gy, 1.6, 1.2, '#777', '#777', 0);
    line(svg, g1x + (stemUp?1.4:-1.4), gy, g1x + (stemUp?1.4:-1.4), gy + (stemUp?-ROW_H*1.4:ROW_H*1.4), '#777', 0.8);
    ellipse(svg, g2x, gy, 1.6, 1.2, '#777', '#777', 0);
    line(svg, g2x + (stemUp?1.4:-1.4), gy, g2x + (stemUp?1.4:-1.4), gy + (stemUp?-ROW_H*1.4:ROW_H*1.4), '#777', 0.8);
    // main head
    if (isOpenHead) ellipse(svg, cx, cy, 4.5, 3, 'none', '#1a1a18', 1.5);
    else            ellipse(svg, cx, cy, 4, 3, '#1a1a18', '#1a1a18', 1);

  } else if (isRoll) {
    // Roll: filled head + tremolo lines on stem
    if (isOpenHead) ellipse(svg, cx, cy, 4.5, 3, 'none', '#1a1a18', 1.5);
    else            ellipse(svg, cx, cy, 4, 3, '#1a1a18', '#1a1a18', 1);

  } else {
    // Normal o/O note head
    if (isWhole) {
      // Whole: large hollow oval, no stem
      ellipse(svg, cx, cy, 5.5, 3.8, 'none', '#1a1a18', 1.8);
    } else if (isHalf) {
      // Half: medium hollow oval + stem
      ellipse(svg, cx, cy, 5, 3.2, 'none', '#1a1a18', 1.5);
    } else {
      // Quarter/8th/16th: filled oval
      if (accent) ellipse(svg, cx, cy, 4.2, 3, '#1a1a18', '#1a1a18', 1);
      else        ellipse(svg, cx, cy, 4, 2.8, '#1a1a18', '#1a1a18', 1);
    }
  }

  // ── Stem ────────────────────────────────────────────────
  // Whole note: no stem. CS/RS/Ghost: stem still drawn (standard)
  if (!isWhole) {
    const headEdge = stemUp ? cy - 3 : cy + 3;
    line(svg, stemX, headEdge, stemX, stemY, '#1a1a18', 1.2);
  }

  // ── Flags (8th/16th) ────────────────────────────────────
  if (!isWhole) {
    if (baseDur === '8' || baseDur === '8t') {
      drawFlag(svg, stemX, stemY, stemUp, 1);
    } else if (baseDur === '16' || baseDur === '16t') {
      drawFlag(svg, stemX, stemY, stemUp, 2);
    }
  }

  // ── Roll tremolo marks (3 slashes on stem) ──────────────
  if (isRoll && !isWhole) {
    for (let i = 0; i < 3; i++) {
      const slashY = stemUp
        ? stemY + stemLen * 0.25 + i * 5
        : stemY - stemLen * 0.25 - i * 5;
      const sx = stemX - 4;
      line(svg, sx, slashY - 3, sx + 8, slashY + 3, '#1a1a18', 1.2);
    }
  }

  // ── Dotted augmentation dot ─────────────────────────────
  if (isDotted) {
    const dotEl = document.createElementNS(SVG_NS, 'circle');
    dotEl.setAttribute('cx', cx + 8);
    dotEl.setAttribute('cy', cy - 1);
    dotEl.setAttribute('r', '1.5');
    dotEl.setAttribute('fill', '#1a1a18');
    svg.appendChild(dotEl);
  }

  // ── Triplet number ──────────────────────────────────────
  if (isTriplet) {
    const num = baseDur === '8t' ? '3' : '6';
    const ty = stemUp ? stemY - 4 : stemY + 9;
    text(svg, cx, ty, num, '#888', '6px');
  }

  // ── Accent mark (>) ─────────────────────────────────────
  if (accent) {
    const ay = stemUp ? cy + ROW_H * 0.85 : cy - ROW_H * 0.35;
    text(svg, cx - 5, ay, '>', '#333', '8px', 'bold');
  }
}

function drawFlag(svg, x, y, stemUp, count) {
  for (let f = 0; f < count; f++) {
    const fy = stemUp ? y + f * 4 : y - f * 4;
    const path = document.createElementNS(SVG_NS, 'path');
    const d = stemUp
      ? `M${x},${fy} C${x+8},${fy+3} ${x+6},${fy+7} ${x+2},${fy+8}`
      : `M${x},${fy} C${x+8},${fy-3} ${x+6},${fy-7} ${x+2},${fy-8}`;
    path.setAttribute('d', d);
    path.setAttribute('fill', 'none');
    path.setAttribute('stroke', '#1a1a18');
    path.setAttribute('stroke-width', '1.2');
    svg.appendChild(path);
  }
}

// SVG helpers
function rect(svg, x, y, w, h, fill, stroke) {
  const el = document.createElementNS(SVG_NS, 'rect');
  el.setAttribute('x', x); el.setAttribute('y', y);
  el.setAttribute('width', w); el.setAttribute('height', h);
  el.setAttribute('fill', fill); if (stroke !== 'none') el.setAttribute('stroke', stroke);
  svg.appendChild(el); return el;
}
function line(svg, x1, y1, x2, y2, stroke, sw) {
  const el = document.createElementNS(SVG_NS, 'line');
  el.setAttribute('x1',x1); el.setAttribute('y1',y1);
  el.setAttribute('x2',x2); el.setAttribute('y2',y2);
  el.setAttribute('stroke', stroke); el.setAttribute('stroke-width', sw);
  svg.appendChild(el);
}
function ellipse(svg, cx, cy, rx, ry, fill, stroke, sw) {
  const el = document.createElementNS(SVG_NS, 'ellipse');
  el.setAttribute('cx',cx); el.setAttribute('cy',cy);
  el.setAttribute('rx',rx); el.setAttribute('ry',ry);
  el.setAttribute('fill', fill); el.setAttribute('stroke', stroke); el.setAttribute('stroke-width', sw);
  svg.appendChild(el);
}
function text(svg, x, y, str, fill, size, weight) {
  const el = document.createElementNS(SVG_NS, 'text');
  el.setAttribute('x', x); el.setAttribute('y', y);
  el.setAttribute('fill', fill); el.setAttribute('font-size', size || '9px');
  el.setAttribute('font-family', 'Georgia, serif');
  if (weight) el.setAttribute('font-weight', weight);
  el.textContent = str;
  svg.appendChild(el);
}

// ═══════════════════════════════════
// UNDO / REDO
// ═══════════════════════════════════
function snapshotForUndo() {
  undoStack.push(JSON.stringify({ measures: measures.map(m=>({rows:(m.rows||m).map(r=>[...r]),durUnit:String(m.durUnit||'4'),sig:m.sig||timeSig,sigOverride:m.sigOverride||false})), lyrics: [...lyrics] }));
  if (undoStack.length > MAX_HISTORY) undoStack.shift();
  redoStack = [];
  updateUndoButtons();
}

function doUndo() {
  if (!undoStack.length) { toast('沒有可以回復的步驟'); return; }
  redoStack.push(JSON.stringify({ measures: measures.map(m=>({rows:(m.rows||m).map(r=>[...r]),durUnit:String(m.durUnit||'4'),sig:m.sig||timeSig,sigOverride:m.sigOverride||false})), lyrics: [...lyrics] }));
  const us = JSON.parse(undoStack.pop()); measures = us.measures.map(m=>({...m,durUnit:String(m.durUnit||'4')})); lyrics = us.lyrics || new Array(measures.length).fill('');
  updateUndoButtons();
  renderStaff();
  updateMeasureInfo();
  toast('已回復上一步');
}

function doRedo() {
  if (!redoStack.length) { toast('沒有可以重做的步驟'); return; }
  undoStack.push(JSON.stringify({ measures: measures.map(m=>({rows:(m.rows||m).map(r=>[...r]),durUnit:String(m.durUnit||'4'),sig:m.sig||timeSig,sigOverride:m.sigOverride||false})), lyrics: [...lyrics] }));
  const rs = JSON.parse(redoStack.pop()); measures = rs.measures.map(m=>({...m,durUnit:String(m.durUnit||'4')})); lyrics = rs.lyrics || new Array(measures.length).fill('');
  updateUndoButtons();
  renderStaff();
  updateMeasureInfo();
  toast('已重做');
}

function updateUndoButtons() {
  const u = document.getElementById('undoBtn');
  const r = document.getElementById('redoBtn');
  if (u) u.style.opacity = undoStack.length ? '1' : '0.25';
  if (r) r.style.opacity = redoStack.length ? '1' : '0.25';
}

// CELL CLICK
// ═══════════════════════════════════
function handleCellClick(measIdx, instIdx, cellIdx) {
  snapshotForUndo();
  const meas = measures[measIdx];
  const rows = meas.rows || meas;

  if (currentSym === 'erase') {
    rows[instIdx][cellIdx] = null;
  } else if (currentSym === 'rest') {
    const existing = rows[instIdx][cellIdx];
    if (existing && existing.sym === 'rest') {
      rows[instIdx][cellIdx] = null;
    } else {
      // rest dur = current selected dur or measure's base dur
      rows[instIdx][cellIdx] = { sym: 'rest', dur: currentDur };
    }
  } else {
    const existing = rows[instIdx][cellIdx];
    if (existing && existing.sym === currentSym && existing.dur === currentDur) {
      rows[instIdx][cellIdx] = null;
    } else {
      rows[instIdx][cellIdx] = { sym: currentSym, dur: currentDur };
    }
  }

  // Auto-resize the measure grid to fit the finest note
  rebuildMeasureAutoGrid(measures[measIdx]);
  renderStaff();
  autoSave();
}

function applyMeasureSigInput() {
  const idxInput = document.getElementById('measSigIdx');

  }
  if (!sig.match(/^[0-9]+\/[0-9]+$/)) {

}

// Prompt user for per-measure sig change
function promptMeasureSig(measIdx) {

  const cur = meas.sig || timeSig;
  const SIGS = ['4/4','3/4','2/4','6/8','7/8','5/4','7/4','9/8','12/8','3/8','5/8','2/2'];
  const curIdx = SIGS.indexOf(cur);
  // Cycle through common sigs, or show prompt for custom
  const next = SIGS[(curIdx + 1) % SIGS.length];
  changeMeasureSig(measIdx, next);
}

// Draw rest symbol in a cell
function drawRestSymbol(svg, cx, cy, cellDur) {
  // cellDur from the cell's own dur field
  const dur  = String(cellDur || '4');
  const base = dur.replace('d','').replace('t','');
  const dot  = dur.includes('d') ? '.' : '';
  // Unicode rest glyphs
  const GLYPHS = {'1':'𝄻','2':'𝄼','4':'𝄽','8':'𝄾','16':'𝄿'};
  const SIZES  = {'1':'11px','2':'9px','4':'9px','8':'8px','16':'7px'};
  const glyph  = (GLYPHS[base] || '𝄽') + dot;
  // Whole rest: drawn as filled rectangle hanging from a line (more readable than glyph)
  if (base === '1') {
    // Whole rest: solid block hanging below a line
    const r = document.createElementNS(SVG_NS, 'rect');
    r.setAttribute('x', cx - 5); r.setAttribute('y', cy - 2);
    r.setAttribute('width', '10'); r.setAttribute('height', '4');
    r.setAttribute('fill', '#aaa');
    svg.appendChild(r);
    line(svg, cx - 6, cy - 2, cx + 6, cy - 2, '#aaa', 0.8);
  } else if (base === '2') {
    // Half rest: solid block sitting on a line
    const r = document.createElementNS(SVG_NS, 'rect');
    r.setAttribute('x', cx - 5); r.setAttribute('y', cy - 2);
    r.setAttribute('width', '10'); r.setAttribute('height', '4');
    r.setAttribute('fill', '#aaa');
    svg.appendChild(r);
    line(svg, cx - 6, cy + 2, cx + 6, cy + 2, '#aaa', 0.8);
  } else {
    // Quarter/8th/16th: use unicode glyphs
    const el = document.createElementNS(SVG_NS, 'text');
    el.setAttribute('x', cx);
    el.setAttribute('y', cy + 4);
    el.setAttribute('text-anchor', 'middle');
    el.setAttribute('font-size', SIZES[base] || '9px');
    el.setAttribute('fill', '#aaa');
    el.setAttribute('font-family', 'Georgia, serif');
    el.textContent = glyph;
    svg.appendChild(el);
  }
}

// Cycle a measure's durUnit through common grids
const DUR_CYCLE = ['4','8','16','8t','16t'];
const DUR_LABELS = {'1':'全音符','2':'二分','4':'四分','8':'八分','16':'十六分',
  '4d':'附點四分','8d':'附點八分','16d':'附點十六分','2d':'附點二分',
  '8t':'八分三連','16t':'十六分六連'};

function cycleMeasureDur(measIdx) {
  snapshotForUndo();
  const meas = measures[measIdx];
  const cur = meas.durUnit || '4';
  const idx = DUR_CYCLE.indexOf(cur);
  const next = DUR_CYCLE[(idx + 1) % DUR_CYCLE.length];
  rebuildMeasureGrid(meas, next);
  renderStaff();
  autoSave();
  toast(`小節 ${measIdx+1} → ${DUR_LABELS[next] || next}`);
}

// Rebuild measure rows to match the auto-detected finest grid
function rebuildMeasureAutoGrid(meas) {
  const newDur = autoGridDur(meas);
  const sig = meas.sig || timeSig;
  const newCpm = cellsForMeasure(sig, newDur);
  const oldRows = meas.rows || meas;
  const oldCpm = oldRows[0].length;
  if (oldCpm === newCpm) return; // already correct size
  const newRows = [];
  for (let i = 0; i < N_INST; i++) {
    const newRow = new Array(newCpm).fill(null);
    oldRows[i].forEach((cell, ci) => {
      if (!cell) return;
      const newCi = Math.round(ci * newCpm / oldCpm);
      if (newCi < newCpm) newRow[newCi] = { ...cell };
    });
    newRows.push(newRow);
  }
  meas.rows = newRows;
  meas.durUnit = newDur; // keep in sync for serialization
}

function rebuildMeasureGrid(meas, newDur) {
  const sig = meas.sig || timeSig;
  const newCpm = cellsForMeasure(sig, newDur);
  const oldRows = meas.rows || meas;
  const newRows = [];
  for (let i = 0; i < N_INST; i++) {
    const newRow = new Array(newCpm).fill(null);
    const oldCpm = oldRows[i].length;
    oldRows[i].forEach((cell, ci) => {
      if (!cell) return;
      const newCi = Math.round(ci * newCpm / oldCpm);
      if (newCi < newCpm) newRow[newCi] = { ...cell };
    });
    newRows.push(newRow);
  }
  meas.rows = newRows;
  meas.durUnit = newDur;
}

// Change a single measure's time sig
function changeMeasureSig(measIdx, newSig) {
  snapshotForUndo();
  const meas = measures[measIdx];
  const dur = meas.durUnit || currentDur;
  const newCpm = cellsForMeasure(newSig, dur);
  const oldRows = meas.rows || meas;
  const newRows = [];
  for (let i = 0; i < N_INST; i++) {
    const newRow = new Array(newCpm).fill(null);
    const oldCpm = oldRows[i].length;
    oldRows[i].forEach((cell, ci) => {
      if (!cell) return;
      const newCi = Math.round(ci * newCpm / oldCpm);
      if (newCi < newCpm) newRow[newCi] = { ...cell };
    });
    newRows.push(newRow);
  }
  meas.rows = newRows;
  meas.sig = newSig;
  meas.sigOverride = true;
  renderStaff();
  autoSave();
  toast(`小節 ${measIdx+1} 拍號 → ${newSig}`);
}

// ═══════════════════════════════════
// PLAYBACK
// ═══════════════════════════════════
function togglePlay() {
  isPlaying ? pausePlay() : startPlay();
}

function startPlay() {
  getAudio();
  isPlaying = true;
  document.getElementById('playBtn').textContent = '⏸ 暫停';
  document.getElementById('playDot').classList.add('on');
  document.getElementById('statusTxt').textContent = '播放中';
  startMs = Date.now() - elapsedMs;
  timerInterval = setInterval(updateTimer, 80);
  tick();
}

function pausePlay() {
  isPlaying = false;
  clearTimeout(playTimer);
  clearInterval(timerInterval);
  elapsedMs = Date.now() - startMs;
  document.getElementById('playBtn').textContent = '▶ 播放';
  document.getElementById('playDot').classList.remove('on');
  document.getElementById('statusTxt').textContent = '暫停';
}

function stopPlay() {
  isPlaying = false;
  clearTimeout(playTimer);
  clearInterval(timerInterval);
  playStep = 0; elapsedMs = 0;
  document.getElementById('playBtn').textContent = '▶ 播放';
  document.getElementById('playDot').classList.remove('on');
  document.getElementById('statusTxt').textContent = '就緒';
  document.getElementById('posInfo').textContent = 'Bar 1 · Beat 1';
}

function toggleLoop() {
  loopEnabled = !loopEnabled;
  document.getElementById('loopBtn').style.opacity = loopEnabled ? '1' : '0.35';
  toast(loopEnabled ? '循環播放開啟' : '循環播放關閉');
}

function tick() {
  if (!isPlaying) return;
  // Build step list with timing
  const allCells = measures.flatMap(m => {
    const rows = m.rows || m;
    const dur = m.durUnit || '4';
    const sig = m.sig || timeSig;
    const baseDur = String(dur).replace('d','').replace('t','');
    // beats per cell
    const isTriplet = String(dur).includes('t');
    const cpb = isTriplet ? 12 : 16;
    const [sigN, sigD] = (sig||'4/4').split('/').map(Number);
    const denom = sigD || 4;
    // one beat = (denom/4) quarter notes; one cell = (1 beat / cpb)
    const cellBeats = (denom / 4) / cpb;
    return Array.from({ length: rows[0].length }, (_, ci) => ({
      notes: INSTRUMENTS.map((inst, ii) => ({ inst: ii, cell: rows[ii][ci] })),
      cellBeats
    }));
  });
  const totalSteps = allCells.length;
  if (playStep >= totalSteps) {
    if (loopEnabled) playStep = 0;
    else { stopPlay(); return; }
  }
  const step = allCells[playStep];
  const cellBeats = step.cellBeats || (1/4);
  const msPerBeat = 60000 / bpm;
  const stepMs = cellBeats * msPerBeat;
  step.notes.forEach(({ inst, cell }) => {
    if (cell && cell.sym !== 'rest' && !mutedInst.has(inst)) {
      playDrum(INSTRUMENTS[inst].abbr, cell.sym === 'X' || cell.sym === 'O');
    }
  });
  playStep++;
  playTimer = setTimeout(tick, stepMs);
}

function updateTimer() {
  const el = Date.now() - startMs;
  const s = Math.floor(el / 1000);
  const m = Math.floor(s / 60);
  const ss = s % 60;
  const cpm = cellsPerMeasure();
  const bar = Math.floor(playStep / cpm) + 1;
  const beat = Math.floor((playStep % cpm) / 4) + 1;
  document.getElementById('posInfo').textContent =
    `Bar ${bar} · Beat ${beat} · ${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
}

function updateBpm(v) {
  bpm = parseInt(v);
  document.getElementById('bpmNum').textContent = v;
}

function updateSig() {
  const val = document.getElementById('sigSelect').value;
  const customInput = document.getElementById('sigCustom');
  if (val === 'custom') {
    customInput.style.display = 'inline-block';
    customInput.focus();
  } else {
    customInput.style.display = 'none';
  }
  // Don't apply yet — wait for confirmGlobalSig()
}

function confirmGlobalSig() {
  const sel = document.getElementById('sigSelect');
  const customInput = document.getElementById('sigCustom');
  let newSig;
  if (sel.value === 'custom') {
    const v = customInput.value.trim();
    if (!v.match(/^\d+\/\d+$/)) { toast('格式錯誤，如 11/8'); return; }
    newSig = v;
    // add to select if not there
    let found = false;
    for (let o of sel.options) { if (o.value === newSig) { found=true; sel.value=newSig; break; } }
    if (!found) {
      const opt = document.createElement('option');
      opt.value = newSig; opt.textContent = newSig;
      sel.insertBefore(opt, sel.querySelector('[value="custom"]'));
      sel.value = newSig;
    }
    customInput.style.display = 'none';
  } else {
    newSig = sel.value;
  }
  snapshotForUndo();
  timeSig = newSig;
  // Apply to all measures that have no independent sig override,
  // or ask user if they want to apply to all
  measures.forEach(m => {
    if (!m.sigOverride) {
      const newCpm = cellsForMeasure(newSig, m.durUnit || currentDur);
      const oldRows = m.rows || m;
      const newRows = [];
      for (let i = 0; i < N_INST; i++) {
        const newRow = new Array(newCpm).fill(null);
        const oldCpm = oldRows[i].length;
        oldRows[i].forEach((cell, ci) => {
          if (!cell) return;
          const newCi = Math.round(ci * newCpm / oldCpm);
          if (newCi < newCpm) newRow[newCi] = { ...cell };
        });
        newRows.push(newRow);
      }
      m.rows = newRows;
      m.sig = newSig;
    }
  });
  renderAll();
  toast(`全局拍號→ ${newSig}`);
}


// ═══════════════════════════════════
// AUDIO
// ═══════════════════════════════════
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function playDrum(abbr, accent) {
  const ctx = getAudio();
  const t = ctx.currentTime;
  const v = accent ? 1.0 : 0.72;
  switch(abbr) {
    case 'B':  kick(ctx,t,v); break;
    case 'S':  snare(ctx,t,v); break;
    case 'HH': hihat(ctx,t,v,false); break;
    case 'OH':
    case 'HF': hihat(ctx,t,v*0.55,true); break;
    case 'CR':
    case 'CC': cymbal(ctx,t,v,180); break;
    case 'RC': cymbal(ctx,t,v*0.7,120); break;
    case 'RB': rideBell(ctx,t,v); break;
    case 'T1': tom(ctx,t,v,220); break;
    case 'T2': tom(ctx,t,v,160); break;
    case 'FT': tom(ctx,t,v,100); break;
    default:   hihat(ctx,t,v*0.4,false); break;
  }
}

function kick(ctx,t,v) {
  const o=ctx.createOscillator(),g=ctx.createGain();
  o.frequency.setValueAtTime(160,t); o.frequency.exponentialRampToValueAtTime(50,t+0.12);
  g.gain.setValueAtTime(v,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.45);
  o.connect(g); g.connect(ctx.destination); o.start(t); o.stop(t+0.5);
  nz(ctx,t,0.02,v*0.3,'lowpass',200);
}
function snare(ctx,t,v) {
  const o=ctx.createOscillator(),g=ctx.createGain();
  o.frequency.setValueAtTime(220,t); o.frequency.exponentialRampToValueAtTime(100,t+0.1);
  g.gain.setValueAtTime(v*0.45,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.14);
  o.connect(g); g.connect(ctx.destination); o.start(t); o.stop(t+0.18);
  nz(ctx,t,0.2,v*0.85,'highpass',1200);
}
function hihat(ctx,t,v,open) { nz(ctx,t,open?0.35:0.07,v*0.45,'highpass',7000); }
function cymbal(ctx,t,v,base) {
  [1,1.32,1.52,1.74,2.05].forEach(r=>{
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.type='square'; o.frequency.value=base*r;
    g.gain.setValueAtTime(v*0.06,t); g.gain.exponentialRampToValueAtTime(0.001,t+1.5);
    o.connect(g); g.connect(ctx.destination); o.start(t); o.stop(t+1.6);
  });
}
function rideBell(ctx,t,v) {
  const o=ctx.createOscillator(),g=ctx.createGain();
  o.type='sine'; o.frequency.value=1050;
  g.gain.setValueAtTime(v*0.55,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.65);
  o.connect(g); g.connect(ctx.destination); o.start(t); o.stop(t+0.7);
}
function tom(ctx,t,v,freq) {
  const o=ctx.createOscillator(),g=ctx.createGain();
  o.frequency.setValueAtTime(freq*1.5,t); o.frequency.exponentialRampToValueAtTime(freq,t+0.07);
  g.gain.setValueAtTime(v*0.9,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.32);
  o.connect(g); g.connect(ctx.destination); o.start(t); o.stop(t+0.4);
  nz(ctx,t,0.03,v*0.15,'bandpass',freq*3);
}
function nz(ctx,t,dur,v,type,freq) {
  const buf=ctx.createBuffer(1,Math.ceil(ctx.sampleRate*dur),ctx.sampleRate);
  const d=buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
  const src=ctx.createBufferSource(); src.buffer=buf;
  const f=ctx.createBiquadFilter(); f.type=type; f.frequency.value=freq;
  const g=ctx.createGain();
  g.gain.setValueAtTime(v,t); g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  src.connect(f); f.connect(g); g.connect(ctx.destination); src.start(t);
}

// ═══════════════════════════════════
// DRIVE + TAGS
// ═══════════════════════════════════

// Read URL params
const params = new URLSearchParams(location.search);
const DRIVE_TOKEN  = params.get('token') || localStorage.getItem('drumtab_token') || null;
// Keep token alive in localStorage (sliding 3hr window)
if (DRIVE_TOKEN) {
  localStorage.setItem('drumtab_token', DRIVE_TOKEN);
  localStorage.setItem('drumtab_expiry', Date.now() + 3 * 60 * 60 * 1000);
}
const DRIVE_FOLDER = params.get('folder');
const DRIVE_ID     = params.get('id');    // null if new
const IS_NEW       = params.get('new') === '1';

let scoreTags = [];

async function gFetch(url, opts = {}) {
  return fetch(url, {
    ...opts,
    headers: {
      Authorization: `Bearer ${DRIVE_TOKEN}`,
      ...(opts.headers || {})
    }
  });
}

function getData() {
  return {
    title: document.getElementById('songTitle').value,
    measures, lyrics, bpm, timeSig,
    savedAt: new Date().toISOString(),
  };
}

async function saveToDrive() {
  const data = getData();
  const title = data.title || '無標題鼓譜';
  const filename = title + '.drum.json';
  const totalBars = measures.length;  // each measure is one bar
  const appProps = {
    bpm: String(bpm),
    timeSig,
    bars: String(totalBars),
    tags: JSON.stringify(scoreTags),
  };
  const body = JSON.stringify({ ...data, tags: scoreTags });

  document.getElementById('saveStatus').textContent = '儲存中…';
  document.getElementById('saveBtn').disabled = true;

  try {
    if (DRIVE_ID && !IS_NEW) {
      // Update existing file
      const boundary = '-------drumtab';
      const meta = JSON.stringify({ name: filename, appProperties: appProps });
      const multipart = `--${boundary}\r\nContent-Type: application/json\r\n\r\n${meta}\r\n--${boundary}\r\nContent-Type: application/json\r\n\r\n${body}\r\n--${boundary}--`;
      await fetch(`https://www.googleapis.com/upload/drive/v3/files/${DRIVE_ID}?uploadType=multipart`, {
        method: 'PATCH',
        headers: {
          Authorization: `Bearer ${DRIVE_TOKEN}`,
          'Content-Type': `multipart/related; boundary=${boundary}`
        },
        body: multipart
      });
    } else {
      // Create new file
      const boundary = '-------drumtab';
      const meta = JSON.stringify({ name: filename, parents: [DRIVE_FOLDER], appProperties: appProps });
      const multipart = `--${boundary}\r\nContent-Type: application/json\r\n\r\n${meta}\r\n--${boundary}\r\nContent-Type: application/json\r\n\r\n${body}\r\n--${boundary}--`;
      const r = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
        method: 'POST',
        headers: {
          Authorization: `Bearer ${DRIVE_TOKEN}`,
          'Content-Type': `multipart/related; boundary=${boundary}`
        },
        body: multipart
      });
      const f = await r.json();
      // Update URL without reload
      history.replaceState({}, '', `editor.html?id=${f.id}&folder=${DRIVE_FOLDER}&token=${DRIVE_TOKEN}`);
    }
    const now = new Date().toLocaleTimeString('zh-TW', { hour:'2-digit', minute:'2-digit' });
    document.getElementById('saveStatus').textContent = `已儲存 ${now}`;
    toast('已儲存至 Google Drive');
  } catch(e) {
    document.getElementById('saveStatus').textContent = '儲存失敗';
    toast('儲存失敗，請檢查網路或重新登入');
  }
  document.getElementById('saveBtn').disabled = false;
}

async function loadFromDrive() {
  if (!DRIVE_ID) return;
  try {
    const r = await gFetch(`https://www.googleapis.com/drive/v3/files/${DRIVE_ID}?alt=media`);
    const data = await r.json();
    applyData(data);
    if (data.tags) { scoreTags = data.tags; renderTagChips(); }
    renderAll();
    toast('已載入');
  } catch(e) { toast('載入失敗'); }
}

// ── TAG UI ──
function manageTags() {
  renderTagChips();
  document.getElementById('tagModal').classList.add('open');
  setTimeout(() => document.getElementById('tagInput').focus(), 80);
}

function addTag() {
  const val = document.getElementById('tagInput').value.trim();
  if (!val || scoreTags.includes(val)) { document.getElementById('tagInput').value = ''; return; }
  scoreTags.push(val);
  document.getElementById('tagInput').value = '';
  renderTagChips();
}

function removeTag(i) {
  scoreTags.splice(i, 1);
  renderTagChips();
}

function renderTagChips() {
  const wrap = document.getElementById('tagChipsWrap');
  if (!wrap) return;
  wrap.innerHTML = scoreTags.map((t, i) => `
    <span style="display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;border:1px solid #d8d8d0;font-size:0.72rem;background:#f8f8f5;color:#555;">
      ${escHtml(t)}
      <span style="cursor:pointer;color:#aaa;font-size:0.65rem;" onclick="removeTag(${i})">✕</span>
    </span>
  `).join('') || '<span style="font-size:0.72rem;color:#aaa">尚無標籤</span>';
}

function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function autoSave() {
  if (DRIVE_TOKEN) saveToDrive();
  else localStorage.setItem('drumtab_v3', JSON.stringify(getData()));
}
setInterval(autoSave, 60000);

function closeModal(id) { document.getElementById(id).classList.remove('open'); }

// Keyboard
document.addEventListener('keydown', e => {
  if (['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName)) return;
  if ((e.metaKey || e.ctrlKey) && e.shiftKey && e.key === 'z') { e.preventDefault(); doRedo(); return; }
  if ((e.metaKey || e.ctrlKey) && e.key === 'z') { e.preventDefault(); doUndo(); return; }
  if (e.key === ' ') { e.preventDefault(); togglePlay(); }
  if (e.key === 'Escape') stopPlay();
  if (e.key === 'e' || e.key === 'E') {
    // toggle erase: press E again to go back to previous sym
    if (currentSym === 'erase') {
      setSym(prevSym, document.getElementById('sym-' + prevSym) || document.getElementById('sym-x'));
    } else {
      setSym('erase', document.getElementById('sym-erase'));
    }
  }
  if (e.key === '4') setDur('4', document.getElementById('dur-4'));
  if (e.key === '8') setDur('8', document.getElementById('dur-8'));
  if (e.key === '6') setDur('16', document.getElementById('dur-16'));
  if (e.key === '2') setDur('2', document.getElementById('dur-2'));
  if (e.key === '1') setDur('1', document.getElementById('dur-1'));
  if (e.key === 'x') setSym('x', document.getElementById('sym-x'));
  if (e.key === 'o') setSym('o', document.getElementById('sym-o'));
  if (e.key === 'r') setSym('r', document.getElementById('sym-r'));
});

let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2400);
}
</script>
